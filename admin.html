<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio Messages</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .navbar-brand span { color: #2563eb; font-weight: 700; }
        .main-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .table th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        .message-text {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .message-text.expanded {
            white-space: normal;
            max-width: none;
        }
        .stat-box {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            color: white;
            border-radius: 12px;
        }
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <!-- ==================== LOGIN SCREEN MODAL ==================== -->
    <div id="login-screen">
        <div class="login-card text-center">
            <div class="mb-4">
                <i class="fas fa-lock fa-3x text-primary mb-2"></i>
                <h3 class="fw-bold">Admin Verification</h3>
                <p class="text-muted small">Enter passcode to access dashboard</p>
            </div>
            <form id="login-form">
                <div class="mb-3">
                    <input type="password" id="admin-passcode" class="form-control text-center py-2" placeholder="••••••••" required>
                    <div class="invalid-feedback">Incorrect Passcode!</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Access Dashboard</button>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN DASHBOARD ==================== -->
    <div id="dashboard-content" style="display: none;">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
            <div class="container">
                <a class="navbar-brand fw-bold fs-4" href="#"><span>DJ</span>Chaudhary Admin</a>
                <button class="btn btn-outline-danger btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i> Logout</button>
            </div>
        </nav>

        <div class="container my-5">
            <!-- Stats & Controls -->
            <div class="row g-4 mb-4 align-items-center">
                <div class="col-md-4">
                    <div class="stat-box p-4 d-flex align-items-center justify-content-between shadow-sm">
                        <div>
                            <h6 class="mb-1 text-white-50">Total Messages</h6>
                            <h2 class="mb-0 fw-bold" id="total-count">0</h2>
                        </div>
                        <i class="fas fa-envelope-open-text fa-3x text-white-50"></i>
                    </div>
                </div>
                <div class="col-md-5 ms-auto">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="search-input" class="form-control border-start-0" placeholder="Search by name or email...">
                    </div>
                </div>
                <div class="col-md-3 text-md-end">
                    <button class="btn btn-danger w-100 py-2" id="clear-all-btn"><i class="fas fa-trash-alt me-2"></i> Delete All Messages</button>
                </div>
            </div>

            <!-- Messages Table Card -->
            <div class="main-card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th scope="col">Date & Time</th>
                                <th scope="col">Sender Name</th>
                                <th scope="col">Email Address</th>
                                <th scope="col">Subject</th>
                                <th scope="col">Message Specification</th>
                                <th scope="col" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="messages-table-body">
                            <tr>
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="fas fa-spinner fa-spin fa-2x mb-2"></i><br>Establishing Firebase Streams...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== FIREBASE CONNECTOR ==================== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ⚠️ आफ्नो Real Firebase Config यहाँ पेस्ट गर (index.html को जस्तै)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== SECURITY PASSCODE ====================
        // यहाँ आफ्नो इच्छा अनुसारको पासवर्ड राख (अहिले 'admin123' छ)
        const SECURE_PASSCODE = "admin123"; 

        const loginScreen = document.getElementById('login-screen');
        const dashboardContent = document.getElementById('dashboard-content');
        const loginForm = document.getElementById('login-form');
        const passcodeInp = document.getElementById('admin-passcode');

        // Check Local Storage session status
        if (sessionStorage.getItem('adminAuthenticated') === 'true') {
            loginScreen.style.display = 'none';
            dashboardContent.style.display = 'block';
            fetchFirebaseMessages();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passcodeInp.value === SECURE_PASSCODE) {
                sessionStorage.setItem('adminAuthenticated', 'true');
                loginScreen.style.display = 'none';
                dashboardContent.style.display = 'block';
                fetchFirebaseMessages();
            } else {
                passcodeInp.classList.add('is-invalid');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('adminAuthenticated');
            window.location.reload();
        });

        // ==================== DATA ARCHITECTURE FLOW ====================
        let allMessages = [];

        function fetchFirebaseMessages() {
            // फायरबेस डेटाबेसको 'contacts' नोडबाट रियलटाइम डेटा तान्ने स्ट्रिम
            database.ref('contacts').on('value', (snapshot) => {
                const data = snapshot.val();
                const tableBody = document.getElementById('messages-table-body');
                allMessages = [];
                
                if (!data) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted"><i class="far fa-folder-open fa-3x mb-2"></i><br>No communications logged in database database core.</td></tr>`;
                    document.getElementById('total-count').textContent = '0';
                    return;
                }

                // Object लाई Array मा कन्भर्ट गर्ने
                Object.keys(data).forEach(key => {
                    allMessages.push({
                        id: key,
                        ...data[key]
                    });
                });

                // नयाँ म्यासेज जहिले पनि माथि देखाउने (Reverse sorting)
                allMessages.reverse();
                document.getElementById('total-count').textContent = allMessages.length;
                renderTable(allMessages);
            });
        }

        function renderTable(dataArray) {
            const tableBody = document.getElementById('messages-table-body');
            tableBody.innerHTML = '';

            dataArray.forEach(msg => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-nowrap small fw-medium text-secondary">${msg.timestamp || 'N/A'}</td>
                    <td class="fw-bold">${escapeHtml(msg.name)}</td>
                    <td><a href="mailto:${msg.email}" class="text-decoration-none">${escapeHtml(msg.email)}</a></td>
                    <td class="text-muted small">${escapeHtml(msg.subject)}</td>
                    <td><div class="message-text text-muted" onclick="this.classList.toggle('expanded')">${escapeHtml(msg.message)}</div></td>
                    <td class="text-center">
                        <button class="btn btn-outline-danger btn-sm rounded-3 px-2.5" onclick="deleteMessage('${msg.id}')" title="Delete Message">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // ==================== ACTIONS ENGINE ====================
        // १. एउटा म्यासेज डिलीट गर्ने फङ्सन
        window.deleteMessage = function(id) {
            if (confirm("Are you certain you want to purge this communication logs?")) {
                database.ref('contacts/' + id).remove()
                    .catch(err => alert("Operation failed: " + err.message));
            }
        }

        // २. सबै म्यासेज एकैपटक डिलीट गर्ने फङ्सन
        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (confirm("🚨 DANGER ZONE: Are you absolutely sure you want to clear ALL messages from Firebase? This cannot be undone!")) {
                database.ref('contacts').remove()
                    .then(() => alert("All database communications purged cleanly."))
                    .catch(err => alert("Operation failed: " + err.message));
            }
        });

        // ३. सर्च इन्जिन फिल्टर
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allMessages.filter(msg => 
                msg.name.toLowerCase().includes(keyword) || 
                msg.email.toLowerCase().includes(keyword) ||
                msg.subject.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
        });

        // Security: XSS Attack रोक्न स्ट्रिङ एस्केप गर्ने युटिलिटी
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
